# git-cliff changelog configuration — feature 00011-release-distribution (OBJ2,
# T016). Consumed by release-plz (release-plz.toml `changelog_config =
# "cliff.toml"`) to generate the changelog carried on every Release PR (OR-004).
#
# Style: keepachangelog (https://keepachangelog.com) sections, grouped by
# Conventional Commit type (feat/fix/etc.). Versions are INDEPENDENT per crate
# (AD-001): release-plz invokes git-cliff per crate, so each crate's changelog
# only contains commits that touched that crate.

[changelog]
# Header rendered once at the top of a fresh changelog file.
header = """
# Changelog

All notable changes to this crate are documented here.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
Versions are bumped automatically by [release-plz](https://release-plz.dev) from
[Conventional Commits](https://www.conventionalcommits.org).
"""

# Per-release body template (Tera). `version`/`commits` are injected by
# release-plz/git-cliff. Unreleased commits render under "Unreleased".
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}]{% if release_link %}({{ release_link }}){% endif %} - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""

# Footer appended once at the very bottom.
footer = """
<!-- generated by git-cliff via release-plz -->
"""

# Tidy whitespace from the rendered template.
trim = true

[git]
# Parse Conventional Commits to derive bumps + group changelog entries.
conventional_commits = true
# Drop non-conventional commits from the changelog (they still appear in git
# history; they just do not produce a changelog line).
filter_unconventional = true
# Allow commit bodies to carry multiple `type: desc` lines split into entries.
split_commits = false

# Map Conventional Commit types to keepachangelog-style sections. `skip = true`
# hides housekeeping commit types from the user-facing changelog.
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Changed" },
    { message = "^doc", group = "<!-- 4 -->Documentation" },
    { message = "^revert", group = "<!-- 5 -->Reverted" },
    { message = "^deprecat", group = "<!-- 6 -->Deprecated" },
    { message = "^remove", group = "<!-- 7 -->Removed" },
    { message = "^sec", group = "<!-- 8 -->Security" },
    { message = "^test", skip = true },
    { message = "^chore", skip = true },
    { message = "^ci", skip = true },
    { message = "^build", skip = true },
    { message = "^style", skip = true },
    { message = ".*", group = "<!-- 9 -->Other" },
]

# Protect against accidental publish of in-progress work: a commit tagged with a
# trailing `[skip changelog]` is omitted.
commit_preprocessors = [
    { pattern = '\s*\[skip changelog\]', replace = "" },
]

# Sort newest-first within a release and newest release first.
filter_commits = false
sort_commits = "newest"
