# cargo-deny policy for the RONin workspace.
# Enforces the security gate from project-instructions §Testing & Quality Policy:
# dependency advisories, license allow-list, and a source/ban policy.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # Added for the egui/eframe desktop GUI tree (E003, ronin-app only):
    # BSL-1.0       — clipboard-win / error-code (arboard clipboard backend)
    # MPL-2.0       — option-ext (directories) and similar permissive-copyleft deps
    # CC0-1.0       — public-domain utility crates in the egui/winit tree
    # OFL-1.1       — bundled default fonts (epaint_default_fonts)
    # Ubuntu-font-1.0 — bundled Ubuntu default font (epaint_default_fonts)
    # All OSI-approved / FSF-free / standard font licenses; no copyleft on linked code.
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# ron-core must stay WASM-clean: no native/cc-built or platform-specific runtime
# deps. These bans document the intent; the wasm32 build gate (T030) is the proof.
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
