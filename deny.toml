# cargo-deny policy for the RONin workspace.
# Enforces the security gate from project-instructions §Testing & Quality Policy:
# dependency advisories, license allow-list, and a source/ban policy.

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    # Added for the egui/eframe desktop GUI tree (E003, ronin-app only):
    # BSL-1.0       — clipboard-win / error-code (arboard clipboard backend)
    # MPL-2.0       — option-ext (directories) and similar permissive-copyleft deps
    # CC0-1.0       — public-domain utility crates in the egui/winit tree
    # OFL-1.1       — bundled default fonts (epaint_default_fonts)
    # Ubuntu-font-1.0 — bundled Ubuntu default font (epaint_default_fonts)
    # All OSI-approved / FSF-free / standard font licenses; no copyleft on linked code.
    "BSL-1.0",
    "MPL-2.0",
    "CC0-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
    # Added for the jsonschema tree (E006, ron-validate only):
    # MIT-0 — borrow-or-share (via fluent-uri → referencing → jsonschema).
    # MIT No Attribution; OSI-approved, strictly more permissive than MIT.
    "MIT-0",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "deny"
# ron-core must stay WASM-clean: no native/cc-built or platform-specific runtime
# deps. These bans document the intent; the wasm32 build gate (T030) is the proof.
#
# ron-validate (E006) must stay WASM-clean AND fully offline (ADR-0006, FR-023):
# it takes `jsonschema` with `default-features = false`, which keeps the default
# `resolve-http`/TLS resolver — and therefore `reqwest`/`rustls` — out of the
# tree. The bans below assert those network-transport crates never appear
# anywhere in the workspace; their presence would mean a `default-features=false`
# regression and would re-introduce network access. (cargo-tree confirms both are
# currently ABSENT from the ron-validate tree on native and wasm32.)
#
# NOTE: cargo-deny bans are workspace-wide and cannot be scoped per-crate, so the
# complementary invariant — `jsonschema`/`serde_json` must stay OUT of `ron-core`
# (it stays rowan-only; HINT-002, AD-007) — is NOT expressed here (those crates
# are legitimately present in ron-validate/ronin-app). That boundary is enforced
# instead by ron-core's own manifest plus the T036 dependency-invariant test and
# the ron-core wasm32 build gate.
deny = [
    { name = "reqwest" },
    { name = "rustls" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
