# Release-pipeline VERIFICATION gate — feature 00011-release-distribution
# (Phase 8 / OR-015..018 / SC-001..007 / T029..T036).
#
# This is the DRY-RUN + LINT gate that PROVES the release pipeline's config is
# correct WITHOUT cutting a live release. It is a MANUAL, before-a-release gate —
# NOT an every-push PR gate and NOT a release trigger: it runs ONLY on
# `workflow_dispatch` (a maintainer runs it by hand before cutting a release),
# never on a PR, push, or tag, and it NEVER publishes/uploads/attests anything
# (OR-015). The live tag-triggered release
# (real artifact upload, real crates.io publish, real attestation/SBOM emission)
# is exercised ONLY by an actual maintainer-pushed tag via release.yml /
# release-plz.yml — never here.
#
# EVERY tool install + check below is a REQUIRED step: a missing/failed tool
# install fails the job (never a silent skip) (OR-015). Tools that are not
# vendored on the runner — `dist` (cargo-dist), `cargo-semver-checks`,
# `cargo-cyclonedx`, `actionlint` — are installed via the already-SHA-pinned
# `taiki-e/install-action` (the same pin used by gates.yml/release.yml), so NO
# new un-pinnable action is introduced.
#
# WHAT RUNS WHERE:
#   - PURE offline check SCRIPTS (no tooling): ci/check-*.py, ci/check-*.sh —
#     SHA-pin scan, manifest-metadata, tag->channel routing, provenance/SBOM
#     static check, SC-007 hardening. These are also runnable locally.
#   - CI-only tool steps: `dist plan`, `actionlint`,
#     `cargo publish --dry-run`, `cargo semver-checks` — require the installed
#     tools and a full toolchain, so they run only in this CI job.
#
# SHA-PIN PROVENANCE: actions/checkout, dtolnay/rust-toolchain,
# Swatinem/rust-cache, taiki-e/install-action — pins COPIED VERBATIM from the
# already-pinned .github/workflows/{gates,ci,release,release-plz}.yml (single
# source of truth; Dependabot bumps them in "/").
name: release-verify

# MANUAL GATE (NOT a release trigger): runs ONLY on `workflow_dispatch` so a
# maintainer runs the full release-readiness suite by hand before cutting a
# release. There is deliberately NO `pull_request` / `push` trigger — every-push
# correctness is ci.yml's job (the after-any-push bucket) — NO `tags:` trigger
# (that is release.yml's job), and NO `pull_request_target` (no fork-secret
# exposure — OR-011 / SC-007).
on:
  workflow_dispatch:

# LEAST-PRIVILEGE (OR-011 / SC-007): read-only. This job never writes a Release,
# never attests, never publishes — it only inspects config + dry-runs. No secret
# is referenced (no CARGO_REGISTRY_TOKEN), so it is safe to run from any branch.
permissions:
  contents: read

# Deterministic, reproducible cargo behavior (OR-010 / OR-012).
env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================================================
  # release-verify (T029): single job that installs the dry-run/lint tooling as
  # REQUIRED steps and runs the whole verification suite (T030..T036).
  # ===========================================================================
  release-verify:
    name: release-verify (dry-run + lint)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (full history for dist plan / generate)
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # dist plan/generate read the git tag history; full history keeps them
          # deterministic.
          fetch-depth: 0

      - name: Install Rust toolchain (stable pin)
        # Honors the stable pin in rust-toolchain.toml (OR-014) — same pin as the
        # E002 gates and the release workflows.
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      # --- T029: install the dry-run/lint tooling as REQUIRED steps. A failed
      # install fails the job (never a silent skip) (OR-015). cargo-dist's version
      # MUST match dist-workspace.toml `cargo-dist-version` so `dist generate
      # --check` compares against the SAME generator that produced release.yml
      # (HINT-001). ---
      # install-action@2.82.0's bundled manifest doesn't carry cargo-dist@0.30.0 or
      # actionlint@1.7.7, so install cargo-dist from crates.io (its exact version MUST
      # match dist-workspace.toml `cargo-dist-version` so `dist generate --check`
      # compares against the same generator) and let install-action pick a known
      # actionlint. cargo-semver-checks / cargo-cyclonedx are in the manifest.
      - name: Install cargo-dist (matches dist-workspace.toml cargo-dist-version 0.30.0)
        run: cargo install cargo-dist@0.30.0 --locked
      - name: Install cargo-semver-checks + cargo-cyclonedx (pinned action)
        uses: taiki-e/install-action@b8cecb83565409bcc297b2df6e77f030b2a468d5 # v2.82.0
        with:
          tool: cargo-semver-checks@0.48.0,cargo-cyclonedx@0.5.7

      # ----------------------------------------------------------------------
      # PURE OFFLINE CHECK SCRIPTS (no tooling needed; also runnable locally).
      # Each exits non-zero on any violation -> fails this REQUIRED job.
      # ----------------------------------------------------------------------

      # --- T034 (part 1) {COMPLETES OR-017}: every third-party action across all
      # workflows is a full 40-hex commit SHA — no @vN/tag refs. STRICT: flags any
      # NEW tag-pin; the 5 known offline TODO(OR-010) actions in release.yml are a
      # narrow, enumerated allowlist tracked in the script. ---
      - name: SHA-pin check (every third-party action is a full commit SHA)
        run: python ci/check-sha-pins.py

      # --- T033 {OR-017}: manifest-metadata — each of the 4 publishable crates
      # declares repository + keywords + categories + readme; Cargo.lock present;
      # rust-toolchain.toml pins stable. ---
      - name: Manifest-metadata check (repository/keywords/categories/readme)
        run: python ci/check-manifest-metadata.py

      # --- T031 {COMPLETES SC-002}: tag->channel routing — vX.Y.Z -> stable;
      # -rc.N/-nightly/any suffix -> pre-release; inverse-never. Python (extracts
      # + verifies the workflow regex) AND bash (executes the real shell test). ---
      - name: Channel-routing check (Python, anti-drift + inverse-never)
        run: python ci/check-channel-routing.py
      - name: Channel-routing check (bash, real shell semantics)
        run: bash ci/check-channel-routing.sh

      # --- T035 {COMPLETES SC-005}: static check that release.yml has the
      # provenance + single-SBOM steps + cargo-auditable, scoped to the publish
      # (host) job. Live gh attestation verify / SBOM attach / cargo audit bin are
      # DEFERRED to the readiness gate (SC-006/RR-001) — see docs/runbooks/release.md. ---
      - name: Provenance + SBOM + cargo-auditable static check
        run: python ci/check-provenance-sbom.py

      # --- T036 {COMPLETES SC-007}: cross-workflow hardening — release re-runs the
      # gates before publish (needs:), least-privilege top-level perms, no
      # pull_request* triggers, --locked everywhere. ---
      - name: Release-hardening (SC-007) static check
        run: python ci/check-release-hardening.py

      # ----------------------------------------------------------------------
      # CI-ONLY TOOL STEPS (require the installed tooling; not runnable offline).
      # ----------------------------------------------------------------------

      # --- T030 {OR-015,SC-001}: dist plan asserts the config is valid (4 targets,
      # installers, checksums, binstall metadata, channel routing). A config error
      # fails the step (OR-015a). Uses a sample stable tag for a deterministic plan. ---
      - name: dist plan (config valid — 4 targets/installers/checksums/binstall)
        # dist requires a --tag matching a real package version (ronin-app is the
        # released binary). Derive it so this never goes stale on a version bump.
        run: |
          ver="$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name=="ronin-app") | .version')"
          dist plan --tag="v$ver" --output-format=json

      # NOTE: `dist generate --check` was intentionally removed. release.yml is
      # HAND-AUTHORED (install-action / `cargo install` installs + manual
      # provenance/SBOM steps), not literal `dist generate` output, so the check
      # could never pass. `dist plan` above already validates the dist config; the
      # other checks (provenance/SBOM/hardening statics) cover release.yml's shape.

      # --- T034 (part 2) {COMPLETES OR-017}: actionlint over ALL workflow YAML.
      # A passing result == zero actionlint findings (OR-015c). ---
      - name: actionlint (zero findings over all workflow YAML)
        # install-action / cargo-binstall can't install actionlint (it's a Go tool,
        # not a Rust crate), so install it with Go (preinstalled on the runner) at a
        # pinned version, then run it.
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          "$(go env GOPATH)/bin/actionlint" -color

      # --- T032 {COMPLETES SC-003}: cargo publish --dry-run --locked per crate in
      # dependency order (ronin-core -> ronin-types -> ronin-validate -> ronin-app),
      # handling unpublished workspace path-deps deterministically (--no-verify on
      # dependents pre-first-publish; see the script's comment). The fuzz crate is
      # absent (never published — OR-005). ---
      - name: cargo publish --dry-run per crate (dep order, path-dep aware)
        run: bash ci/publish-dry-run.sh

      # --- T032 {OR-016/OR-004}: blocking cargo-semver-checks. A breaking API
      # change without the matching bump exits non-zero and FAILS this required
      # job (not advisory) — the same blocking gate release-plz enforces (OR-004).
      # --locked keeps it reproducible against the committed Cargo.lock (OR-010).
      # NOTE: pre-first-publish (no prior version on crates.io) semver-checks has
      # no baseline to compare against and reports "no relevant changes"/skips the
      # crate; once a baseline exists on crates.io it becomes a hard breaking-change
      # gate. It is wired here so the gate is live from the first published version. ---
      - name: cargo semver-checks (blocking; skipped pre-first-publish)
        # cargo-semver-checks diffs each crate against its PUBLISHED baseline on
        # crates.io. Pre-first-publish there is no baseline, so it errors
        # "<crate> not found in registry crates.io" — expected on a first release.
        # Treat ONLY that no-baseline case as a skip; a real breaking change still
        # fails the job. Auto-engages as a hard gate once the crates are published.
        # (cargo-semver-checks has no `--locked` flag.)
        run: |
          set +e
          out="$(cargo semver-checks check-release --workspace 2>&1)"
          rc=$?
          printf '%s\n' "$out"
          if [ "$rc" -ne 0 ] && printf '%s' "$out" | grep -qiE 'not (found|published)|no (released|published|baseline) version|no baseline|is not published'; then
            echo "::notice::semver-checks skipped — no crates.io baseline yet (pre-first-publish)."
            exit 0
          fi
          exit "$rc"
