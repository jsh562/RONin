# CI Quality Gates (feature 00002-ci-quality-gates; refactored in E011 T006).
#
# Enforces the RONin "Verified Quality" invariants on every change. As of E011
# (AD-003 / HINT-004) the gate jobs themselves live in the REUSABLE workflow
# `.github/workflows/gates.yml`; this workflow only owns the PR/push/cron
# *triggers* and DELEGATES to that reusable workflow via `uses:`. The release
# pipeline calls the SAME `gates.yml`, so PR CI and the release re-run identical
# gate definitions — no duplicated drift (OR-009 / SC-007).
#
# The gates (defined in gates.yml, ported verbatim from this file's prior
# inlined jobs) are:
#   - check        : rustfmt + clippy (-D warnings)             [OR-001, OR-002]
#   - test         : cargo test on Linux/Windows/macOS          [OR-003, OR-009]
#   - wasm         : ronin-core builds for wasm32-unknown-unknown  [OR-004]
#   - wasm-validate: ronin-validate builds for wasm32-unknown-unknown [FR-023]
#   - supply-chain : cargo-audit + cargo-deny (PR/push + cron)   [OR-005]
#
# Triggers preserved from E002 (unchanged):
#   - pull_request (never pull_request_target; fork PRs validate identically —
#     OR-011 / SC-010, and the reusable gates.yml references no `secrets.*`).
#   - push to main.
#   - the daily supply-chain cron — every trigger that fires this workflow runs
#     ALL gates in gates.yml, so the cron still runs the supply-chain gate (and
#     the rest), catching newly published advisories with no new commit
#     (AD-004 / OR-005 / SC-004).
#
# Least-privilege GITHUB_TOKEN preserved: top-level `permissions: contents:
# read` here AND in gates.yml; the called workflow cannot exceed the caller's
# grant (OR-012 / SC-009).
#
# BRANCH-PROTECTION NOTE (PR-gating byte-equivalence): the SAME five gate jobs
# run with the SAME ids/steps/matrix/SHAs/`--locked` as before — gating is
# byte-equivalent in substance. The ONLY surface change is the check NAME: a job
# run via a reusable workflow is reported as "<caller-job> / <called-job>"
# (e.g. `gates / test (ubuntu-latest)`, `gates / check (fmt + clippy)`). The
# caller job below is named `gates` to keep those names stable and
# self-describing. If required-status-check branch protection was configured
# against the OLD inlined names (`check`, `test (ubuntu-latest)`, `wasm ...`,
# `supply-chain ...`), re-point it at the new `gates / <job>` names — the
# repo-admin step in docs/runbooks/branch-protection.md (RR-001).
name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Daily supply-chain scan (00:00 UTC) so newly published advisories are
    # caught with no new commit (AD-004 / OR-005 / SC-004). On this trigger the
    # called gates.yml still runs the supply-chain gate (and all other gates).
    - cron: "0 0 * * *"

# Least-privilege GITHUB_TOKEN for all jobs; no write scopes, no inheritance of
# the repository's default token permissions (OR-012 / SC-009). A reusable
# workflow cannot be granted more than its caller, so this cap also bounds
# gates.yml.
permissions:
  contents: read

jobs:
  # Delegate every E002 gate (check/test/wasm/wasm-validate/supply-chain) to the
  # reusable workflow. This single `uses:` runs ALL five jobs defined in
  # gates.yml on each trigger (PR, push:main, daily cron) — same job
  # definitions the release pipeline re-runs (OR-009 / AD-003 / HINT-004).
  gates:
    uses: ./.github/workflows/gates.yml
